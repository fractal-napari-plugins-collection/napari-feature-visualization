[workspace]
name = "napari-feature-visualization"
channels = ["conda-forge"]
platforms = ["osx-arm64", "osx-64", "linux-64", "win-64"]

[dependencies]
python = ">=3.10,<3.13"
napari = ">=0.7.0"
numpy = "*"
matplotlib = "*"
qtpy = "*"
pyqt6 = "*"
superqt = "*"
pytest = "*"
pytest-cov = "*"
pytest-qt = "*"
ruff = "*"
pandas = "<3.0.0" # set to * once ngio 0.5 is adopted

[pypi-dependencies]
napari-feature-visualization = { path = ".", editable = true }

[feature.plugin-dev.pypi-dependencies]
zarr = "<3.0.0" # Remove once napari-ome-zarr-navigator adopts ngio 0.5
napari-feature-classifier = ">=0.3.2"
napari-ome-zarr = ">=0.6.0, <0.7.0" # Switch to >0.7 once ngio 0.5 is used
napari-ome-zarr-navigator = ">=0.2.6"
ipykernel = "*"

[environments]
plugin-dev = ["plugin-dev"]

[tasks]
test = "pytest -v --color=yes --cov=napari_feature_visualization --cov-report=xml"
napari = "napari"
lint = "ruff check src"
format = "ruff format src"
check = { depends-on = ["lint", "test"] }

[tasks.napari-ome-zarr]
cmd = "napari"
default-environment = "plugin-dev"

[tasks.napari-ome-zarr-navigator]
cmd = "napari"
default-environment = "plugin-dev"
